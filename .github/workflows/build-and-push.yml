name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: il-jerusalem-1.ocir.io
          username: axiwhc5fgu9i/shemtov.aaron@gmail.com
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      # Three tags per build:
      #   - 0.0.<run_number> — monotonic semver consumed by Flux ImagePolicy
      #   - <short-sha>       — immutable, traceable for rollback
      #   - latest            — convenience; never used by k8s manifests
      - name: Resolve image tags
        id: tag
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "ver=0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            il-jerusalem-1.ocir.io/axiwhc5fgu9i/pwd-frontend:${{ steps.tag.outputs.ver }}
            il-jerusalem-1.ocir.io/axiwhc5fgu9i/pwd-frontend:${{ steps.tag.outputs.sha }}
            il-jerusalem-1.ocir.io/axiwhc5fgu9i/pwd-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Image pushed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version tag (used by Flux): \`${{ steps.tag.outputs.ver }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- SHA tag (traceability):     \`${{ steps.tag.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Convenience tag:            \`latest\`" >> $GITHUB_STEP_SUMMARY
