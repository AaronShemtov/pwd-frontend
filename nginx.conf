server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # HTML — short cache + must-revalidate so the browser always rechecks
    # before reusing. Edits to index.html are picked up on next refresh.
    location ~* \.html$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # CSS / JS — short cache, no immutable. We rewrite these files in place
    # on every build, so we explicitly want the browser to re-check.
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # Images and fonts — longer cache. These rarely change content for
    # the same filename. If you need a hard refresh, bump the filename
    # or purge the CDN.
    location ~* \.(ico|webp|png|jpg|jpeg|gif|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # PDFs — force download, medium cache.
    location ~* \.pdf$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header Content-Disposition "attachment";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
